<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FastAPI Auth</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen flex-col gap-4">

	<div class="bg-white p-8 rounded-xl shadow-md w-96">

		<h1 class="text-2xl font-bold mb-6 text-center">Auth System</h1>

		<input id="username" type="text" placeholder="Username" class="w-full p-2 border rounded mb-3">
		<input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded mb-4">

		<div class="flex gap-2 mb-4">
			<button onclick="register()" class="bg-blue-500  text-white px-4 py-2 rounded w-full hover:bg-blue-600">
				Register
			</button>
			<button onclick="login()" class="bg-green-500 text-white px-4 py-2 rounded w-full hover:bg-green-600">
				Login
			</button>
		</div>

		<button onclick="getMe()" class="bg-purple-500 text-white px-4 py-2 rounded w-full mb-2 hover:bg-purple-600">
			Get User Info
		</button>
		<button onclick="logout()" class="bg-red-400    text-white px-4 py-2 rounded w-full mb-4 hover:bg-red-500">
			Logout
		</button>

		<!-- Natija shu yerda chiqadi -->
		<div id="result" class="text-sm text-gray-700 bg-gray-50 p-3 rounded min-h-8 whitespace-pre-wrap"></div>
	</div>

	<a href="./task.html" class="text-blue-600 underline hover:text-blue-800">
		→ Vazifalar sahifasiga o'tish
	</a>

	<!--
    tsc buyrug'i src/main.ts ni dist/main.js ga compile qiladi
    Brauzer faqat .js faylni o'qiydi
  -->
	<script src="./dist/main.js"></script>

</body>

</html>
